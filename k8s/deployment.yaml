apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
        - name: task-manager
          image: aryan7890/task-manager:latest
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: db-storage
              mountPath: /app
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: task-db-pvc
