<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0f;
        --surface: #1a1a1c;
        --surface2: #232325;
        --border: #2e2e31;
        --accent: #c8f135;
        --accent-dim: #9ab828;
        --text: #f0f0ee;
        --muted: #7a7a80;
        --done-color: #3a3a3d;
        --red: #ff4d4d;
        --radius: 14px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", monospace;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 60px 20px;
      }

      .container {
        width: 100%;
        max-width: 560px;
      }

      /* Header */
      .header {
        margin-bottom: 40px;
        animation: fadeDown 0.5s ease both;
      }

      .header-label {
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }

      .header h1 {
        font-family: "Syne", sans-serif;
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
        color: var(--text);
      }

      .header h1 span {
        color: var(--accent);
      }

      .task-count {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      /* Add form */
      .add-form {
        display: flex;
        gap: 10px;
        margin-bottom: 32px;
        animation: fadeDown 0.5s 0.1s ease both;
      }

      .add-form input {
        flex: 1;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .add-form input::placeholder {
        color: var(--muted);
      }

      .add-form input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(200, 241, 53, 0.1);
      }

      .add-form button {
        background: var(--accent);
        color: #0e0e0f;
        border: none;
        border-radius: var(--radius);
        padding: 14px 22px;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        white-space: nowrap;
      }

      .add-form button:hover {
        background: #d4f84a;
      }
      .add-form button:active {
        transform: scale(0.97);
      }

      /* Filters */
      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        animation: fadeDown 0.5s 0.15s ease both;
      }

      .filter-btn {
        background: none;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 6px 14px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn:hover,
      .filter-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(200, 241, 53, 0.06);
      }

      /* Task list */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: fadeDown 0.5s 0.2s ease both;
      }

      .task-item {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        transition:
          border-color 0.2s,
          transform 0.15s;
        animation: slideIn 0.3s ease both;
      }

      .task-item:hover {
        border-color: var(--surface2);
        transform: translateX(3px);
      }

      .task-item.done-item {
        opacity: 0.45;
      }

      /* Custom checkbox */
      .check-btn {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 2px solid var(--border);
        background: none;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        text-decoration: none;
      }

      .check-btn:hover {
        border-color: var(--accent);
        background: rgba(200, 241, 53, 0.1);
      }

      .check-btn.checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .check-btn.checked::after {
        content: "";
        width: 5px;
        height: 9px;
        border: 2px solid #0e0e0f;
        border-top: none;
        border-left: none;
        transform: rotate(45deg) translateY(-1px);
        display: block;
      }

      .task-title {
        flex: 1;
        font-size: 14px;
        line-height: 1.4;
        color: var(--text);
      }

      .task-item.done-item .task-title {
        text-decoration: line-through;
        color: var(--muted);
      }

      .delete-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 4px;
        border-radius: 6px;
        transition:
          color 0.15s,
          background 0.15s;
        text-decoration: none;
        display: flex;
        align-items: center;
      }

      .delete-btn:hover {
        color: var(--red);
        background: rgba(255, 77, 77, 0.1);
      }

      /* Empty state */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }

      .empty-icon {
        font-size: 40px;
        margin-bottom: 14px;
        opacity: 0.4;
      }

      .empty p {
        font-size: 13px;
        line-height: 1.6;
      }

      /* Progress bar */
      .progress-wrap {
        margin-bottom: 24px;
        animation: fadeDown 0.5s 0.18s ease both;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .progress-bar {
        height: 4px;
        background: var(--surface2);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 99px;
        transition: width 0.4s ease;
      }

      /* Animations */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 99px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-label">&#9673; pipeline deployed</div>
        <h1>Task<span>Flow</span></h1>
        <div class="task-count" id="task-count"></div>
      </div>

      <form class="add-form" action="/add" method="post" id="add-form">
        <input
          name="title"
          id="task-input"
          placeholder="What needs to be done?"
          required
          autocomplete="off"
        />
        <button type="submit">+ Add</button>
      </form>

      <div class="filters">
        <button class="filter-btn active" onclick="filterTasks('all', this)">
          All
        </button>
        <button class="filter-btn" onclick="filterTasks('active', this)">
          Active
        </button>
        <button class="filter-btn" onclick="filterTasks('done', this)">
          Done
        </button>
      </div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-meta">
          <span>Progress</span>
          <span id="progress-text">0 / 0 done</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="task-list" id="task-list">
        {% if tasks %} {% for task in tasks %}
        <div
          class="task-item {% if task['done'] %}done-item{% endif %}"
          data-status="{% if task['done'] %}done{% else %}active{% endif %}"
        >
          <a
            href="{% if not task['done'] %}/done/{{ task['id'] }}{% else %}#{% endif %}"
            class="check-btn {% if task['done'] %}checked{% endif %}"
            title="Mark done"
          ></a>
          <span class="task-title">{{ task['title'] }}</span>
          <a
            href="/delete/{{ task['id'] }}"
            class="delete-btn"
            title="Delete"
            onclick="return confirm('Delete this task?');"
            >&#10005;</a
          >
        </div>
        {% endfor %} {% else %}
        <div class="empty" id="empty-state">
          <div class="empty-icon">&#10003;</div>
          <p>No tasks yet.<br />Add something above to get started.</p>
        </div>
        {% endif %}
      </div>
    </div>

    <script>
      function updateStats() {
        const items = document.querySelectorAll(".task-item");
        const done = document.querySelectorAll(".task-item.done-item");
        const total = items.length;
        const doneCount = done.length;

        document.getElementById("task-count").textContent =
          total === 0
            ? "No tasks"
            : `${total} task${total !== 1 ? "s" : ""} total`;

        document.getElementById("progress-text").textContent =
          `${doneCount} / ${total} done`;

        const pct = total === 0 ? 0 : Math.round((doneCount / total) * 100);
        document.getElementById("progress-fill").style.width = pct + "%";

        document.getElementById("progress-wrap").style.display =
          total === 0 ? "none" : "block";
      }

      function filterTasks(type, btn) {
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        document.querySelectorAll(".task-item").forEach((item) => {
          const status = item.dataset.status;
          if (type === "all") item.style.display = "flex";
          else if (type === "active")
            item.style.display = status === "active" ? "flex" : "none";
          else if (type === "done")
            item.style.display = status === "done" ? "flex" : "none";
        });
      }

      // Enter key submits
      document
        .getElementById("task-input")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") document.getElementById("add-form").submit();
        });

      updateStats();
    </script>
  </body>
</html>
