<!doctype html>
<html>
  <head>
    <title>My Task Uploader</title>
  </head>
  <body>
    <h1>TMy task uploader</h1>
    <form action="/add" method="post">
      <input name="title" placeholder="New task..." required />
      <button type="submit">Add</button>
    </form>
    <ul>
      {% for task in tasks %}
      <li>
        {% if task['done'] %}<s>{{ task['title'] }}</s>
        {% else %}{{ task['title'] }}
        <a href="/done/{{ task['id'] }}">Done</a>
        {% endif %}
        <a href="/delete/{{ task['id'] }}">Delete</a>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
